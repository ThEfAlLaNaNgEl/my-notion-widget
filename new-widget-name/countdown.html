<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini Sidebar Countdown</title>
    <style>
        /* --- SIDEBAR STYLE CONFIG --- */
        :root {
            --bg-color: #191919;       /* Matches Notion Dark Mode */
            --text-color: #ffffff;     /* Number color */
            --label-color: #7a7a7a;    /* Letter color (d, h, m, s) */
            --accent-color: #ff4a4a;   /* Alert color */
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: var(--font-family);
            margin: 0;
            padding: 4px 8px;
            display: flex;
            align-items: center;
            justify-content: flex-start; /* Aligns left for clean sidebar integration */
            overflow: hidden;
        }

        .mini-counter {
            display: flex;
            align-items: baseline;
            gap: 6px;
            font-size: 0.95rem; /* Small, crisp text size */
            font-weight: 600;
            letter-spacing: -0.01em;
        }

        .unit {
            display: inline-block;
        }

        .label {
            color: var(--label-color);
            font-size: 0.75rem;
            font-weight: 500;
            margin-left: 1px;
            text-transform: lowercase;
        }

        .expired {
            color: var(--accent-color);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <div class="mini-counter" id="countdown">
        <span class="unit"><span id="days">00</span><span class="label">d</span></span>
        <span class="unit"><span id="hours">00</span><span class="label">h</span></span>
        <span class="unit"><span id="minutes">00</span><span class="label">m</span></span>
        <span class="unit"><span id="seconds">00</span><span class="label">s</span></span>
    </div>

    <script>
        // --- SET YOUR TARGET TIME HERE ---
        const TARGET_DATE = new Date("2026-07-01T00:00:00").getTime();
        const EXPIRED_TEXT = "• TARGET REACHED •";

        function updateCountdown() {
            const now = new Date().getTime();
            const difference = TARGET_DATE - now;

            if (difference < 0) {
                document.getElementById("countdown").innerHTML = `<span class="expired">${EXPIRED_TEXT}</span>`;
                clearInterval(intervalId);
                return;
            }

            const d = Math.floor(difference / (1000 * 60 * 60 * 24));
            const h = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((difference % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');
        }

        updateCountdown();
        const intervalId = setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
