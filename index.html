<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Needle Thin Fantasy Countdown</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root {
            --glow-crimson: rgba(163, 29, 29, 0.5);
            --glow-bright: rgba(255, 51, 51, 0.8);
            --text-pure: #f5f5f7;
            --text-ghost: #4c4c52;
            --font-numbers: 'Cormorant Garamond', serif;
            --font-labels: 'Cinzel', serif;
        }

        body {
            background: transparent !important;
            color: var(--text-pure);
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            box-sizing: border-box;
        }

        .system-matrix {
            display: flex;
            gap: 1.2rem;
            justify-content: center;
            align-items: center;
            background: transparent;
            width: 100%;
            max-width: 950px;
        }

        .matrix-node {
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 60px;
        }

        .counter-value {
            font-family: var(--font-numbers);
            font-size: 3.4rem; /* Tall, needle-thin format */
            font-weight: 300; /* Ultra light weight */
            line-height: 0.9;
            color: var(--text-pure);
            /* Soft ethereal backing aura to maintain readability on thin lines */
            text-shadow: 0 0 6px var(--glow-crimson), 0 4px 8px rgba(0, 0, 0, 0.9);
            transition: all 0.4s ease;
        }

        .matrix-node:hover .counter-value {
            color: #ffffff;
            font-weight: 400;
            text-shadow: 0 0 12px var(--glow-bright), 0 0 20px rgba(0, 0, 0, 0.95);
            transform: translateY(-2px);
        }

        .matrix-label {
            font-family: var(--font-labels);
            font-size: 0.45rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-ghost);
            margin-top: 0.7rem;
            font-weight: 700;
            transition: color 0.3s ease;
        }

        .matrix-node:hover .matrix-label {
            color: var(--text-pure);
        }

        .node-separator {
            font-family: var(--font-numbers);
            font-size: 1.6rem;
            font-weight: 300;
            color: rgba(163, 29, 29, 0.3);
            text-shadow: 0 0 4px var(--glow-crimson);
            margin-bottom: 1.1rem;
        }

        /* Interface configuration interface hidden deep at the floor */
        .system-utility {
            margin-top: 1.8rem;
            opacity: 0.05;
            transition: opacity 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .system-utility:hover {
            opacity: 1;
        }

        .action-trigger {
            background: none;
            border: none;
            color: var(--text-ghost);
            font-family: var(--font-labels);
            font-size: 0.5rem;
            letter-spacing: 2px;
            cursor: pointer;
            text-transform: uppercase;
        }

        .action-trigger:hover {
            color: #ffffff;
            text-shadow: 0 0 5px var(--glow-bright);
        }

        .drawer-panel {
            display: none;
            margin-top: 0.6rem;
            gap: 6px;
        }

        .drawer-panel.open {
            display: flex;
        }

        input[type="datetime-local"] {
            background: #0d0e11;
            border: 1px solid rgba(163, 29, 29, 0.4);
            color: #fff;
            padding: 4px 8px;
            font-family: monospace;
            font-size: 0.8rem;
            outline: none;
            border-radius: 4px;
        }

        .bind-trigger {
            background: rgba(163, 29, 29, 0.15);
            border: 1px solid var(--glow-crimson);
            color: #fff;
            padding: 4px 10px;
            cursor: pointer;
            font-family: var(--font-labels);
            font-size: 0.6rem;
            font-weight: 600;
            border-radius: 4px;
        }

        .bind-trigger:hover {
            background: rgba(163, 29, 29, 0.4);
        }
    </style>
</head>
<body>

    <div class="system-matrix">
        <div class="matrix-node">
            <span class="counter-value" id="val-yrs">00</span>
            <span class="matrix-label">Years</span>
        </div>
        <div class="node-separator">·</div>
        <div class="matrix-node">
            <span class="counter-value" id="val-mos">00</span>
            <span class="matrix-label">Months</span>
        </div>
        <div class="node-separator">·</div>
        <div class="matrix-node">
            <span class="counter-value" id="val-wks">00</span>
            <span class="matrix-label">Weeks</span>
        </div>
        <div class="node-separator">·</div>
        <div class="matrix-node">
            <span class="counter-value" id="val-dys">00</span>
            <span class="matrix-label">Days</span>
        </div>
        <div class="node-separator">·</div>
        <div class="matrix-node">
            <span class="counter-value" id="val-hrs">00</span>
            <span class="matrix-label">Hours</span>
        </div>
        <div class="node-separator">·</div>
        <div class="matrix-node">
            <span class="counter-value" id="val-mins">00</span>
            <span class="matrix-label">Mins</span>
        </div>
        <div class="node-separator">·</div>
        <div class="matrix-node">
            <span class="counter-value" id="val-secs">00</span>
            <span class="matrix-label">Secs</span>
        </div>
    </div>

    <div class="system-utility">
        <button class="action-trigger" onclick="toggleDrawer()">[ Set Matrix Target ]</button>
        <div class="drawer-panel" id="configDrawer">
            <input type="datetime-local" id="dateSelector">
            <button class="bind-trigger" onclick="executeBinding()">Calibrate</button>
        </div>
    </div>

    <script>
        let targetTimestamp = localStorage.getItem('system-rpg-needle')
            ? new Date(localStorage.getItem('system-rpg-needle'))
            : new Date(new Date().getFullYear() + 1, 0, 1);

        function processTimeMatrix() {
            const now = new Date();
            if (targetTimestamp <= now) {
                purgeDisplay();
                return;
            }

            let matrixTrack = new Date(now.getTime());
            
            let yrs = targetTimestamp.getFullYear() - matrixTrack.getFullYear();
            matrixTrack.setFullYear(matrixTrack.getFullYear() + yrs);
            if (matrixTrack > targetTimestamp) {
                yrs--;
                matrixTrack.setFullYear(matrixTrack.getFullYear() - 1);
            }

            let mos = 0;
            while (true) {
                let milestone = new Date(matrixTrack.getTime());
                milestone.setMonth(milestone.getMonth() + 1);
                if (milestone <= targetTimestamp) {
                    mos++;
                    matrixTrack.setMonth(matrixTrack.getMonth() + 1);
                } else {
                    break;
                }
            }

            let deltaPool = targetTimestamp.getTime() - matrixTrack.getTime();

            const wUnits = 1000 * 60 * 60 * 24 * 7;
            const dUnits = 1000 * 60 * 60 * 24;
            const hUnits = 1000 * 60 * 60;
            const mUnits = 1000 * 60;

            let wks = Math.floor(deltaPool / wUnits); deltaPool %= wUnits;
            let dys = Math.floor(deltaPool / dUnits); deltaPool %= dUnits;
            let hrs = Math.floor(deltaPool / hUnits); deltaPool %= hUnits;
            let mins = Math.floor(deltaPool / mUnits); deltaPool %= mUnits;
            let secs = Math.floor(deltaPool / 1000);

            document.getElementById('val-yrs').innerText = yrs.toString().padStart(2, '0');
            document.getElementById('val-mos').innerText = mos.toString().padStart(2, '0');
            document.getElementById('val-wks').innerText = wks.toString().padStart(2, '0');
            document.getElementById('val-dys').innerText = dys.toString().padStart(2, '0');
            document.getElementById('val-hrs').innerText = hrs.toString().padStart(2, '0');
            document.getElementById('val-mins').innerText = mins.toString().padStart(2, '0');
            document.getElementById('val-secs').innerText = secs.toString().padStart(2, '0');
        }

        function purgeDisplay() {
            ['val-yrs', 'val-mos', 'val-wks', 'val-dys', 'val-hrs', 'val-mins', 'val-secs'].forEach(id => {
                document.getElementById(id).innerText = "00";
            });
        }

        function toggleDrawer() {
            document.getElementById('configDrawer').classList.toggle('open');
            const offset = targetTimestamp.getTimezoneOffset() * 60000;
            document.getElementById('dateSelector').value = (new Date(targetTimestamp - offset)).toISOString().slice(0, 16);
        }

        function executeBinding() {
            const value = document.getElementById('dateSelector').value;
            if(value) {
                localStorage.setItem('system-rpg-needle', value);
                targetTimestamp = new Date(value);
                toggleDrawer();
                processTimeMatrix();
            }
        }

        setInterval(processTimeMatrix, 1000);
        processTimeMatrix();
    </script>
</body>
</html>
